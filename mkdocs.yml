site_name: Pacino
site_url: https://uarchlabs.github.io/pacino/
site_description: Pacino RISC-V Processor Microarchitecture Documentation
site_author: uarchlabs

repo_name: uarchlabs/pacino
repo_url: https://github.com/uarchlabs/pacino

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md

  - Frontend:
    - Overview: frontend/overview.md
    - Instruction Cache:
      - Overview: frontend/icache/overview.md
      - Tags: frontend/icache/tags.md
      - Data Arrays: frontend/icache/data_arrays.md
      - I-TLB: frontend/icache/itlb.md
      - PLRU: frontend/icache/plru.md
      - Victim Buffer: frontend/icache/victim_buffer.md
      - MSHRs: frontend/icache/mshrs.md
      - Prefetcher: frontend/icache/prefetcher.md
      - IL2 Interface: frontend/icache/il2_interface.md
    - Instruction Fetch:
      - Overview: frontend/fetch/overview.md
      - Fetch Target Queue: frontend/fetch/ftq.md
      - Branch Detector: frontend/fetch/branch_detector.md
      - Pre-Fusion Detector: frontend/fetch/prefusion_detector.md
    - Branch Prediction Unit:
      - Overview: frontend/bpu/overview.md
      - uBTB: frontend/bpu/ubtb.md
      - TAGE: frontend/bpu/tage.md
      - Statistical Corrector: frontend/bpu/sc.md
      - Fetch Target Buffer: frontend/bpu/ftb.md
      - Loop Predictor: frontend/bpu/loop_predictor.md
      - ITTage: frontend/bpu/ittage.md
      - Return Address Stack: frontend/bpu/ras.md
      - History Module: frontend/bpu/history_module.md
      - Dual Prediction: frontend/bpu/dual_prediction.md

  - Backend:
    - Overview: backend/overview.md
    - Decode:
