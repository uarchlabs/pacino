<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacino — Co-design sessions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #21272e;
      --bg2:      #2a3038;
      --bg3:      #323b44;
      --bg4:      #1c2128;
      --border:   #353f4a;
      --border2:  #4a5666;
      --text:     #e8ecf0;
      --muted:    #8a97a6;
      --dim:      #556070;
      --accent:   #b84c25;
      --accent2:  #d96b3f;
      --mono:     'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;

      /* Category colours */
      --c-bp:     #d96b3f;
      --c-decode: #2dca97;
      --c-comp:   #5ca8f0;
      --c-infra:  #a49ff0;
      --c-tb:     #e09a2a;
      --c-tools:  #8a97a6;

      /* Status colours */
      --s-done:   #639922;
      --s-prog:   #e09a2a;
      --s-aband:  #8a4040;

      /* Voice colours */
      --v-ia:     #353f4a;
      --v-my:     #b84c25;
      --v-pa:     #378ADD;

      /* Manual indicator colour */
      --manual:   #9b6fd4;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* -- Top bar -- */
    .topbar {
      background: var(--bg4);
      border-bottom: 0.5px solid var(--border);
      padding: 10px 16px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .topbar-title {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent2);
    }
    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-search {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 5px 9px;
      width: 180px;
      outline: none;
    }
    .filter-search:focus { border-color: var(--border2); }
    .filter-search::placeholder { color: var(--dim); }

    .filter-sep {
      width: 0.5px;
      height: 18px;
      background: var(--border);
    }

    .pill {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 3px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      letter-spacing: 0.04em;
      user-select: none;
    }
    .pill:hover { border-color: var(--border2); color: var(--text); }
    .pill.active {
      background: var(--bg3);
      color: var(--text);
      border-color: var(--border2);
    }

    .filter-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      margin-left: auto;
    }

    /* -- Layout -- */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* -- Session list -- */
    .session-list {
      width: 300px;
      flex-shrink: 0;
      border-right: 0.5px solid var(--border);
      overflow-y: auto;
      background: var(--bg);
    }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .session-card {
      padding: 10px 14px;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .session-card:hover  { background: var(--bg2); }
    .session-card.active {
      background: var(--bg3);
      border-left: 2px solid var(--accent);
      padding-left: 12px;
    }
    .session-card.abandoned { opacity: 0.6; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .card-id {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
    .cat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-complete  { background: var(--s-done); }
    .dot-progress  { background: var(--s-prog); }
    .dot-abandoned { background: var(--s-aband); }

    /* Manual badge in card */
    .manual-badge-card {
      font-family: var(--mono);
      font-size: 8px;
      padding: 1px 4px;
      border-radius: 2px;
      border: 0.5px solid var(--manual);
      color: var(--manual);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .card-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 4px;
    }
    .card-overview {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 5px;
    }
    .tag {
      font-family: var(--mono);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 2px;
      border: 0.5px solid var(--border);
      color: var(--dim);
      letter-spacing: 0.03em;
    }
    .tag-warn {
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* Sub-session indent marker */
    .session-card.is-sub {
      padding-left: 22px;
      background: var(--bg4);
    }
    .session-card.is-sub:hover  { background: var(--bg2); }
    .session-card.is-sub.active { padding-left: 20px; }
    .sub-marker {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      margin-right: 4px;
    }

    /* -- Detail panel -- */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 40px;
    }
    .detail-panel::-webkit-scrollbar { width: 4px; }
    .detail-panel::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
    }

    /* Detail: header */
    .dh {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 16px;
    }
    .dh-id {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--accent2);
    }
    .dh-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .dh-status {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .status-complete {
      background: rgba(99,153,34,0.15);
      color: #8fcf4a;
      border: 0.5px solid rgba(99,153,34,0.3);
    }
    .status-in-progress {
      background: rgba(224,154,42,0.15);
      color: #f5b844;
      border: 0.5px solid rgba(224,154,42,0.3);
    }
    .status-abandoned {
      background: rgba(138,64,64,0.15);
      color: #d07070;
      border: 0.5px solid rgba(138,64,64,0.3);
    }
    .status-unknown {
      background: var(--bg3);
      color: var(--dim);
      border: 0.5px solid var(--border);
    }

    /* Manual badge in detail header */
    .manual-badge-detail {
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 3px;
      border: 0.5px solid var(--manual);
      color: var(--manual);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .dh-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 0 16px;
    }

    /* Detail: modules */
    .modules {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }
    .module-tag {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 3px;
      padding: 2px 7px;
      color: var(--muted);
    }

    /* Detail: task type tags */
    .type-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 18px;
    }
    .type-tag {
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 3px;
      border: 0.5px solid var(--border2);
      color: var(--dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Detail: warnings */
    .warn-block {
      background: rgba(184,76,37,0.08);
      border: 0.5px solid rgba(184,76,37,0.3);
      border-left: 2px solid var(--accent);
      border-radius: 0 4px 4px 0;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    .warn-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent2);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .warn-item {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      padding-left: 10px;
    }
    .warn-code { color: var(--accent); margin-right: 6px; }

    /* Detail: section headers */
    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 20px 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }

    /* Detail: collapsible panels (overview, prompt, results,
       files modified) */
    .collapsible {
      border: 0.5px solid var(--border);
      border-radius: 5px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .coll-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg2);
      cursor: pointer;
      user-select: none;
    }
    .coll-header:hover { background: var(--bg3); }
    .coll-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .coll-chevron {
      margin-left: auto;
      color: var(--dim);
      font-size: 12px;
      transition: transform 0.15s;
    }
    .coll-chevron.open { transform: rotate(180deg); }
    .coll-body {
      padding: 14px 16px;
      background: var(--bg4);
      display: none;
    }
    .coll-body.open { display: block; }

    /* Detail: voice panels */
    .voice-panel {
      border: 0.5px solid var(--border);
      border-radius: 5px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .voice-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg2);
      cursor: pointer;
      user-select: none;
      border-bottom: 0.5px solid var(--border);
    }
    .voice-header:hover { background: var(--bg3); }
    .voice-accent {
      width: 3px;
      height: 14px;
      border-radius: 1px;
      flex-shrink: 0;
    }
    .voice-name {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
    }
    .voice-chevron {
      margin-left: auto;
      color: var(--dim);
      font-size: 12px;
      transition: transform 0.15s;
    }
    .voice-chevron.open { transform: rotate(180deg); }
    .voice-body {
      padding: 12px 14px;
      background: var(--bg4);
    }
    .voice-body.ia-body {
      font-family: var(--mono);
      font-size: 11px;
      color: #9ea8b3;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .voice-placeholder {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      font-style: italic;
      padding: 8px 0;
    }

    /* Files modified list */
    .files-list {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.8;
      padding: 0;
      list-style: none;
    }
    .files-list li::before {
      content: '- ';
      color: var(--dim);
    }
    .files-list-empty {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      font-style: italic;
    }

    /* Markdown rendered content */
    .md-body {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
    .md-body h1,.md-body h2,.md-body h3,.md-body h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin: 14px 0 6px;
      padding-bottom: 4px;
      border-bottom: 0.5px solid var(--border);
    }
    .md-body p  { margin: 0 0 10px; }
    .md-body ul,.md-body ol { padding-left: 18px; margin: 0 0 10px; }
    .md-body li { margin-bottom: 3px; }
    .md-body code {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      color: #9ea8b3;
    }
    .md-body pre {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0 0 10px;
    }
    .md-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 11px;
      line-height: 1.6;
    }
    .md-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 0 0 10px;
      font-size: 12px;
    }
    .md-body th,.md-body td {
      border: 0.5px solid var(--border);
      padding: 5px 10px;
      text-align: left;
    }
    .md-body th {
      background: var(--bg3);
      color: var(--text);
      font-weight: 500;
    }
    .md-body blockquote {
      border-left: 2px solid var(--border2);
      padding-left: 12px;
      color: var(--dim);
      margin: 0 0 10px;
    }
    .md-body a { color: var(--accent2); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body hr {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 12px 0;
    }

    /* Fallback banner */
    .fallback-banner {
      background: rgba(224,154,42,0.08);
      border: 0.5px solid rgba(224,154,42,0.25);
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: #f5b844;
    }

    /* Loading / error */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
    }

    @media (max-width: 700px) {
      .session-list {
        width: 100%;
        border-right: none;
        border-bottom: 0.5px solid var(--border);
        max-height: 40vh;
      }
      .layout { flex-direction: column; }
      .detail-panel { padding: 14px 14px 32px; }
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">pacino &middot; co-design sessions</div>
  <div class="filters" id="filters">
    <input class="filter-search" id="search" type="text"
           placeholder="search id, module, overview&hellip;">
    <div class="filter-sep"></div>
    <span id="cat-pills"></span>
    <div class="filter-sep"></div>
    <span id="status-pills"></span>
    <div class="filter-count" id="count"></div>
  </div>
</div>

<!-- Two-column layout -->
<div class="layout">
  <div class="session-list" id="session-list">
    <div class="loading">loading sessions&hellip;</div>
  </div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty">// select a session</div>
  </div>
</div>

<script>
// -- Config -------------------------------------------------------------------

const CAT_COLORS = {
  BP:     '#d96b3f',
  DECODE: '#2dca97',
  COMP:   '#5ca8f0',
  INFRA:  '#a49ff0',
  TB:     '#e09a2a',
  TOOLS:  '#8a97a6',
};

const STATUS_CLASS = {
  'complete':    'status-complete',
  'in-progress': 'status-in-progress',
  'abandoned':   'status-abandoned',
};
const STATUS_DOT = {
  'complete':    'dot-complete',
  'in-progress': 'dot-progress',
  'abandoned':   'dot-abandoned',
};

// -- State --------------------------------------------------------------------

let allSessions  = [];
let activeId     = null;
let filterCats   = new Set();
let filterStatus = new Set();
let searchText   = '';

// -- Utilities ----------------------------------------------------------------

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
           .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function md(text) {
  if (!text) return '<em style="color:var(--dim)">&#8212;</em>';
  if (typeof marked === 'undefined') return `<pre>${esc(text)}</pre>`;
  return marked.parse(text);
}

function catColor(cat) {
  return CAT_COLORS[cat] || '#8a97a6';
}

function isSubSession(session) {
  return /^[A-Z]+-\d+([a-z]|-\d+)/.test(session.id);
}

function isManual(session) {
  return Array.isArray(session.modes) &&
         session.modes.includes('manual');
}

// -- Task ID parsing ----------------------------------------------------------

function parseTaskId(id) {
  const m = id.match(/^([A-Z]+)-(\d+)([a-z]?)(-\d+)?$/);
  if (!m) return null;
  return {
    cat: m[1], num: parseInt(m[2]),
    sl: m[3]||'', sn: m[4]||'',
    cluster: `${m[1]}-${m[2]}`
  };
}

// -- Filtering ----------------------------------------------------------------

function sessionMatchesFilters(s) {
  if (filterCats.size   > 0 && !filterCats.has(s.category))   return false;
  if (filterStatus.size > 0 && !filterStatus.has(s.status))   return false;
  if (searchText) {
    const q   = searchText.toLowerCase();
    const hay = [s.id, s.overview, ...(s.modules||[])]
                  .join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

// -- List rendering -----------------------------------------------------------

function renderList() {
  const el      = document.getElementById('session-list');
  const countEl = document.getElementById('count');
  const visible = allSessions.filter(sessionMatchesFilters);
  countEl.textContent = `${visible.length} / ${allSessions.length}`;

  if (!visible.length) {
    el.innerHTML =
      '<div class="loading">no sessions match filters</div>';
    return;
  }

  el.innerHTML = visible.map(s => {
    const isSub    = isSubSession(s);
    const cc       = catColor(s.category);
    const sdClass  = STATUS_DOT[s.status] || 'dot-abandoned';
    const warnCount = (s.warnings||[]).length;
    const types    = (s.task_types||[]).map(t =>
      `<span class="tag">${t}</span>`).join('');
    const warnTag  = warnCount > 0
      ? `<span class="tag tag-warn">${warnCount} ` +
        `warn${warnCount>1?'s':''}</span>` : '';
    const subMark  = isSub
      ? `<span class="sub-marker">&ldquo;</span>` : '';
    const manBadge = isManual(s)
      ? `<span class="manual-badge-card">manual</span>` : '';
    const ov = s.overview
      ? s.overview.replace(/[#\n]/g,' ').replace(/\s+/g,' ').trim()
      : s.has_markers === false
        ? '(pre-marker file &mdash; markdown fallback)'
        : '&mdash;';

    const isActive  = s.id === activeId ? 'active' : '';
    const isAbandon = s.status === 'abandoned' ? 'abandoned' : '';
    const isSc      = isSub ? 'is-sub' : '';

    return `<div class="session-card ${isActive} ${isAbandon} ${isSc}"
                 data-id="${esc(s.id)}"
                 onclick="selectSession('${esc(s.id)}')">
      <div class="card-top">
        ${subMark}
        <span class="cat-dot" style="background:${cc}"></span>
        <span class="card-id">${esc(s.id)}</span>
        ${manBadge}
        <span class="status-dot ${sdClass}"></span>
      </div>
      <div class="card-meta">${esc(s.date||'&mdash;')} &middot; \
${esc(s.run_time||'&mdash;')} &middot; \
${s.ctx_pct != null ? s.ctx_pct+'% ctx' : '&mdash;'}</div>
      <div class="card-overview">${ov}</div>
      <div class="card-tags">${types}${warnTag}</div>
    </div>`;
  }).join('');
}

// -- Detail rendering ---------------------------------------------------------

function renderDetail(s) {
  const dp = document.getElementById('detail-panel');
  const cc = catColor(s.category);

  // Header
  const statusCls = STATUS_CLASS[s.status] || 'status-unknown';
  const meta = [
    s.date       && `date: ${s.date}`,
    s.run_time   && `time: ${s.run_time}`,
    s.ctx_pct != null && `ctx: ${s.ctx_pct}%`,
    s.model      && `model: ${s.model}`,
    s.resume_sha && `sha: ${s.resume_sha.slice(0,8)}&hellip;`,
    s.pa_session && s.pa_session !== '???' &&
      `pa_session: ${s.pa_session}`,
  ].filter(Boolean).join('  &middot;  ');

  // Manual badge for detail header
  const manBadgeDetail = isManual(s)
    ? `<span class="manual-badge-detail">manual</span>` : '';

  // Modules
  const modTags = (s.modules||[]).map(m =>
    `<span class="module-tag">${esc(m)}</span>`).join('');

  // Task types
  const typeTags = (s.task_types||[]).map(t =>
    `<span class="type-tag">${esc(t)}</span>`).join('');

  // Warnings
  const warns   = (s.warnings||[]);
  const warnHtml = warns.length
    ? `<div class="warn-block">
         <div class="warn-label">&#9888; ${warns.length} parser ` +
      `warning${warns.length>1?'s':''}</div>
         ${warns.map(w =>
           `<div class="warn-item">` +
           `<span class="warn-code">[${w.code}]</span>` +
           `${esc(w.msg)}</div>`).join('')}
       </div>` : '';

  // Fallback banner
  const fallback = !s.has_markers
    ? `<div class="fallback-banner">&#9888; Pre-marker file &mdash; ` +
      `rendered as raw markdown. Add ` +
      `<code>:: HEADER:START ::</code> markers to enable structured ` +
      `parsing.</div>` : '';

  // Overview collapsible (positioned above // discussion)
  const overviewSection = s.overview
    ? `<div class="section-label">// overview</div>` +
      collapsible('overview', s.overview, /*open=*/true) : '';

  // Voice panels
  const voicePanels = s.has_markers
    ? buildVoices(s)
    : `<div class="voice-panel">
         <div class="voice-header" onclick="toggleVoice(this)">
           <span class="voice-accent"
                 style="background:var(--border2)"></span>
           <span class="voice-name">full session text</span>
           <span class="voice-chevron open">&#9660;</span>
         </div>
         <div class="voice-body">
           <div class="md-body">${md(s.discussion_raw)}</div>
         </div>
       </div>`;

  // Prompt + Results collapsibles
  const promptColl  = s.prompt_raw
    ? collapsible('// prompt', s.prompt_raw, /*open=*/false) : '';
  const resultsColl = s.results_raw
    ? collapsible('// results', s.results_raw, /*open=*/false) : '';

  // Files modified
  const filesHtml = buildFilesModified(s);

  dp.innerHTML = `
    <div class="dh">
      <div>
        <div class="dh-id" style="color:${cc}">${esc(s.id)}</div>
        <div class="dh-meta">${meta}</div>
      </div>
      <div class="dh-right">
        ${manBadgeDetail}
        <div class="dh-status ${statusCls}">
          ${esc(s.status||'unknown')}
        </div>
      </div>
    </div>

    ${modTags  ? `<div class="modules">${modTags}</div>` : ''}
    ${typeTags ? `<div class="type-row">${typeTags}</div>` : ''}
    ${warnHtml}
    ${fallback}

    ${overviewSection}

    <div class="section-label">// discussion</div>
    ${voicePanels}

    ${promptColl
      ? `<div class="section-label">// prompt</div>${promptColl}`
      : ''}
    ${resultsColl
      ? `<div class="section-label">// results</div>${resultsColl}`
      : ''}

    ${filesHtml}
  `;
}

function buildVoices(s) {
  return [
    { label: 'IA &mdash; console output', key: 'ia_output',
      color: 'var(--border2)', isCode: true  },
    { label: 'My assessment',  key: 'my_assessment',
      color: 'var(--accent)',  isCode: false },
    { label: 'PA assessment',  key: 'pa_assessment',
      color: 'var(--v-pa)',    isCode: false },
  ].map(({label, key, color, isCode}) => {
    const text = s[key];
    const bodyHtml = text
      ? (isCode
          ? `<div class="voice-body ia-body">${esc(text)}</div>`
          : `<div class="voice-body">` +
            `<div class="md-body">${md(text)}</div></div>`)
      : `<div class="voice-body">` +
        `<div class="voice-placeholder">&mdash; no ` +
        `${label.toLowerCase()} recorded</div></div>`;

    return `<div class="voice-panel">
      <div class="voice-header" onclick="toggleVoice(this)">
        <span class="voice-accent" style="background:${color}"></span>
        <span class="voice-name">${label}</span>
        <span class="voice-chevron open">&#9660;</span>
      </div>
      ${bodyHtml}
    </div>`;
  }).join('');
}

function collapsible(title, text, open) {
  const openClass = open ? ' open' : '';
  const chevClass = open ? ' open' : '';
  return `<div class="collapsible">
    <div class="coll-header" onclick="toggleColl(this)">
      <span class="coll-title">${title}</span>
      <span class="coll-chevron${chevClass}">&#9660;</span>
    </div>
    <div class="coll-body${openClass}">
      <div class="md-body">${md(text)}</div>
    </div>
  </div>`;
}

function buildFilesModified(s) {
  const files = s.files_modified;
  if (!files || files.length === 0) return '';

  const items = files.map(f =>
    `<li>${esc(f)}</li>`).join('');

  return `<div class="section-label">// files modified</div>
    <div class="collapsible">
      <div class="coll-header" onclick="toggleColl(this)">
        <span class="coll-title">` +
        `${files.length} file${files.length !== 1 ? 's' : ''}</span>
        <span class="coll-chevron open">&#9660;</span>
      </div>
      <div class="coll-body open">
        <ul class="files-list">${items}</ul>
      </div>
    </div>`;
}

// -- Toggle handlers ----------------------------------------------------------

function toggleVoice(header) {
  const body    = header.nextElementSibling;
  const chevron = header.querySelector('.voice-chevron');
  const isOpen  = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : '';
  chevron.classList.toggle('open', !isOpen);
}

function toggleColl(header) {
  const body    = header.nextElementSibling;
  const chevron = header.querySelector('.coll-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open', body.classList.contains('open'));
}

// -- Session selection --------------------------------------------------------

function selectSession(id) {
  activeId = id;
  const s  = allSessions.find(x => x.id === id);
  renderList();
  if (s) renderDetail(s);
  else document.getElementById('detail-panel').innerHTML =
    '<div class="detail-empty">session not found</div>';
}

// -- Filter pills -------------------------------------------------------------

function buildFilterPills() {
  const cats    = [...new Set(
    allSessions.map(s => s.category).filter(Boolean))].sort();
  const catEl    = document.getElementById('cat-pills');
  const statusEl = document.getElementById('status-pills');

  catEl.innerHTML = cats.map(cat => {
    const color = catColor(cat);
    return `<button class="pill" data-cat="${cat}"
              style="border-color:${color}22"
              onclick="toggleCatFilter('${cat}', this)">${cat}</button>`;
  }).join(' ');

  statusEl.innerHTML = ['complete','in-progress','abandoned'].map(st =>
    `<button class="pill" data-status="${st}"
       onclick="toggleStatusFilter('${st}', this)">${st}</button>`
  ).join(' ');
}

function toggleCatFilter(cat, btn) {
  filterCats.has(cat) ? filterCats.delete(cat) : filterCats.add(cat);
  btn.classList.toggle('active', filterCats.has(cat));
  renderList();
}

function toggleStatusFilter(st, btn) {
  filterStatus.has(st)
    ? filterStatus.delete(st) : filterStatus.add(st);
  btn.classList.toggle('active', filterStatus.has(st));
  renderList();
}

document.getElementById('search').addEventListener('input', e => {
  searchText = e.target.value.trim();
  renderList();
});

// -- Boot ---------------------------------------------------------------------

async function init() {
  try {
    const res  = await fetch('sessions.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allSessions = data.sessions || [];
    buildFilterPills();
    renderList();
    document.getElementById('count').textContent =
      `${allSessions.length} / ${allSessions.length}`;

//    if (allSessions.length > 0) {
//      selectSession(allSessions[allSessions.length - 1].id);
//    }

    const DEFAULT_SESSION = 'BP-048';
    const defaultId = allSessions.find(s => s.id === DEFAULT_SESSION)
                      ? DEFAULT_SESSION
                      : allSessions.length > 0
                        ? allSessions[allSessions.length - 1].id
                        : null;
    if (defaultId) selectSession(defaultId);
  } catch (err) {
    document.getElementById('session-list').innerHTML =
      `<div class="loading" style="color:var(--accent2)">` +
      `error loading sessions.json<br>` +
      `<small>${esc(err.message)}</small></div>`;
    document.getElementById('detail-panel').innerHTML =
      `<div class="detail-empty">run ` +
      `<code>python3 tools/gen_sessions.py</code> ` +
      `to generate sessions.json</div>`;
  }
}

if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
}

init();
</script>
</body>
</html>
