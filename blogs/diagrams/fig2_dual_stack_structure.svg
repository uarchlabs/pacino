<?xml version="1.0" encoding="UTF-8"?>
<svg width="780" height="510" viewBox="0 0 780 510" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>Figure 2 - RAS dual-stack structure</title>
  <rect x="0" y="0" width="780" height="510" fill="#ffffff"/>
  <defs>
    <marker id="ahL" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#0d9488"/></marker>
    <marker id="ahP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#475569"/></marker>
  </defs>

  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">RAS dual-stack structure: two independent register-file arrays</text>

  <!-- ============ LEFT PANEL: speculative stack ============ -->
  <rect x="24" y="46" width="320" height="312" rx="10" fill="#f8fafc" stroke="#2563eb" stroke-width="1.5"/>
  <text x="184" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Speculative stack — 16 entries</text>
  <text x="184" y="87" text-anchor="middle" font-size="11" fill="#64748b">simple circular buffer</text>

  <g font-size="11" fill="#1e293b">
    <rect x="48" y="100" width="150" height="26" fill="#eef2ff" stroke="#94a3b8"/><text x="123" y="117" text-anchor="middle">idx 0  (BOS sentinel)</text>
    <rect x="48" y="126" width="150" height="26" fill="#dbeafe" stroke="#2563eb"/><text x="123" y="143" text-anchor="middle">idx 1   ret_addr</text>
    <rect x="48" y="152" width="150" height="26" fill="#dbeafe" stroke="#2563eb"/><text x="123" y="169" text-anchor="middle">idx 2   ret_addr</text>
    <rect x="48" y="178" width="150" height="26" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="123" y="195" text-anchor="middle" font-weight="700">idx 3   ret_addr</text>
    <rect x="48" y="204" width="150" height="26" fill="#f1f5f9" stroke="#cbd5e1"/><text x="123" y="221" text-anchor="middle">idx 4   (free)</text>
    <rect x="48" y="230" width="150" height="26" fill="#f1f5f9" stroke="#cbd5e1"/><text x="123" y="247" text-anchor="middle">…       …</text>
    <rect x="48" y="256" width="150" height="26" fill="#f1f5f9" stroke="#cbd5e1"/><text x="123" y="273" text-anchor="middle">idx 15  (free)</text>
  </g>

  <!-- spec pointers (inside panel, to the right of slots) -->
  <g font-size="11" font-weight="700">
    <line x1="244" y1="113" x2="202" y2="113" stroke="#d97706" stroke-width="1.5"/>
    <text x="248" y="117" fill="#b45309">BOS</text>
    <line x1="244" y1="191" x2="202" y2="191" stroke="#dc2626" stroke-width="1.5"/>
    <text x="248" y="195" fill="#dc2626">TOSR (top)</text>
    <line x1="244" y1="217" x2="202" y2="217" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="248" y="221" fill="#7c3aed">TOSW</text>
  </g>

  <g font-size="10" fill="#475569">
    <text x="48" y="304">empty: TOSR == BOS   ·   overflow: TOSW+1 == BOS</text>
    <text x="48" y="320">usable depth = 15 (one slot reserved as sentinel)</text>
    <text x="48" y="336">TOSW monotonic across pops — popped data survives</text>
    <text x="48" y="352">→ enables pointer-only restore</text>
  </g>

  <!-- ============ RIGHT PANEL: commit stack ============ -->
  <rect x="436" y="46" width="320" height="312" rx="10" fill="#f8fafc" stroke="#0d9488" stroke-width="1.5"/>
  <text x="596" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">Commit stack — 32 entries</text>
  <text x="596" y="87" text-anchor="middle" font-size="11" fill="#64748b">conventional circular stack</text>

  <g font-size="11" fill="#1e293b">
    <rect x="460" y="100" width="150" height="26" fill="#ccfbf1" stroke="#0d9488"/><text x="535" y="117" text-anchor="middle">committed</text>
    <rect x="460" y="126" width="150" height="26" fill="#ccfbf1" stroke="#0d9488"/><text x="535" y="143" text-anchor="middle">committed</text>
    <rect x="460" y="152" width="150" height="26" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/><text x="535" y="169" text-anchor="middle" font-weight="700">committed  ← top</text>
    <rect x="460" y="178" width="150" height="26" fill="#f1f5f9" stroke="#cbd5e1"/><text x="535" y="195" text-anchor="middle">(free)</text>
    <rect x="460" y="204" width="150" height="26" fill="#f1f5f9" stroke="#cbd5e1"/><text x="535" y="221" text-anchor="middle">…</text>
  </g>
  <g font-size="11" font-weight="700">
    <line x1="656" y1="191" x2="614" y2="191" stroke="#0d9488" stroke-width="1.5"/>
    <text x="660" y="195" fill="#0f766e">CSP</text>
  </g>
  <g font-size="10" fill="#475569">
    <text x="460" y="258">updated at retire (one commit / cycle); top = CSP-1</text>
    <text x="460" y="274">read-only fallback when speculative empty</text>
    <text x="460" y="290">commit advances BOS to committing TOSR</text>
  </g>

  <!-- fallback arrow in the gap, commit -> spec -->
  <line x1="436" y1="330" x2="346" y2="330" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ahL)"/>
  <text x="391" y="324" text-anchor="middle" font-size="9.5" fill="#0f766e">fallback</text>

  <!-- ============ BOTTOM PANEL: FTQ snapshot ============ -->
  <rect x="24" y="378" width="732" height="118" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="40" y="400" font-size="13" font-weight="700" fill="#b45309">FTQ entry snapshot — bp_ras_snapshot_t (12 b, one per prediction)</text>
  <g font-size="11.5" fill="#92400e">
    <rect x="40"  y="410" width="170" height="30" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="125" y="430" text-anchor="middle">tosr (4 b)</text>
    <rect x="225" y="410" width="170" height="30" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="310" y="430" text-anchor="middle">tosw (4 b)</text>
    <rect x="410" y="410" width="170" height="30" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="495" y="430" text-anchor="middle">bos (4 b)</text>
  </g>
  <text x="40" y="462" font-size="11" fill="#92400e">Restore reloads all three pointers (pointer-only); circular array data is never cleared.</text>
  <text x="40" y="479" font-size="11" fill="#92400e">BOS priority: restore &gt; commit &gt; hold.</text>

  <!-- snapshot link from spec panel down to FTQ panel -->
  <line x1="184" y1="358" x2="184" y2="376" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ahP)"/>
</svg>
