<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="330" viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>Figure 3 - Same-cycle slot0=call, slot1=return bypass</title>
  <rect x="0" y="0" width="760" height="330" fill="#ffffff"/>
  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#1d4ed8"/></marker>
    <marker id="ahx" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#94a3b8"/></marker>
  </defs>
  <text x="380" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Same cycle: slot 0 = call, slot 1 = return</text>

  <!-- slot0 -->
  <rect x="40" y="60" width="200" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="140" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">slot 0: PUSH</text>
  <text x="140" y="106" text-anchor="middle" font-size="11.5" fill="#1d4ed8">ras_fall_through_p2[0]</text>
  <text x="140" y="121" text-anchor="middle" font-size="11.5" fill="#1d4ed8">-> working top view</text>

  <!-- working top -->
  <rect x="300" y="60" width="170" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="385" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">w_top_addr</text>
  <text x="385" y="110" text-anchor="middle" font-size="11" fill="#92400e">(not yet in array)</text>

  <!-- slot1 -->
  <rect x="530" y="60" width="200" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="630" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">slot 1: POP</text>
  <text x="630" y="106" text-anchor="middle" font-size="11.5" fill="#1d4ed8">ras_pop_addr_p2[1]</text>
  <text x="630" y="121" text-anchor="middle" font-size="11.5" fill="#1d4ed8">= forwarded value</text>

  <!-- bypass arrows -->
  <line x1="240" y1="95" x2="298" y2="95" stroke="#1d4ed8" stroke-width="2" marker-end="url(#ah4)"/>
  <line x1="470" y1="95" x2="528" y2="95" stroke="#1d4ed8" stroke-width="2" marker-end="url(#ah4)"/>
  <text x="385" y="150" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1d4ed8">combinational forward -- no array read</text>

  <!-- array, written at edge -->
  <rect x="300" y="200" width="170" height="56" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="385" y="224" text-anchor="middle" font-size="12" fill="#475569">spec array slot</text>
  <text x="385" y="242" text-anchor="middle" font-size="10.5" fill="#64748b">written on clock edge</text>
  <line x1="385" y1="132" x2="385" y2="198" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ahx)"/>
  <text x="500" y="172" font-size="10.5" fill="#64748b">slot1 must NOT wait for this</text>

  <text x="40" y="290" font-size="11" fill="#475569">Without the bypass, slot 1 would read a stale/empty array slot. With it, the just-pushed return</text>
  <text x="40" y="307" font-size="11" fill="#475569">address is available to slot 1 in the same cycle. Pinned by tb_ras TC-06.</text>
</svg>
