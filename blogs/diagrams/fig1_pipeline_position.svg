<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>Figure 1 - RAS position in the BP prediction pipeline</title>
  <rect x="0" y="0" width="760" height="400" fill="#ffffff"/>
  <!-- stage columns -->
  <g>
    <rect x="20"  y="40" width="170" height="320" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="200" y="40" width="170" height="320" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="380" y="40" width="170" height="320" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="560" y="40" width="180" height="320" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="105" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">s0 / p0</text>
    <text x="285" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">s1 / p1</text>
    <text x="465" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">s2 / p2</text>
    <text x="650" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">s3 / p3</text>
    <text x="105" y="80" text-anchor="middle" font-size="11" fill="#64748b">index / TOS read</text>
    <text x="285" y="80" text-anchor="middle" font-size="11" fill="#64748b">uBTB + Loop</text>
    <text x="465" y="80" text-anchor="middle" font-size="11" fill="#64748b">FTB+TAGE+ITTAGE+RAS</text>
    <text x="650" y="80" text-anchor="middle" font-size="11" fill="#64748b">SC + repair</text>
  </g>
  <!-- predictor chips -->
  <g font-size="12" fill="#1e293b">
    <rect x="35"  y="96" width="140" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8"/><text x="105" y="113" text-anchor="middle">uBTB index</text>
    <rect x="215" y="96" width="140" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8"/><text x="285" y="113" text-anchor="middle">uBTB</text>
    <rect x="215" y="128" width="140" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8"/><text x="285" y="145" text-anchor="middle">Loop</text>
    <rect x="395" y="96"  width="140" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8"/><text x="465" y="113" text-anchor="middle">FTB</text>
    <rect x="395" y="128" width="140" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8"/><text x="465" y="145" text-anchor="middle">TAGE</text>
    <rect x="395" y="160" width="140" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8"/><text x="465" y="177" text-anchor="middle">ITTAGE</text>
    <rect x="575" y="96"  width="150" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8"/><text x="650" y="113" text-anchor="middle">SC</text>
  </g>
  <!-- RAS highlighted path -->
  <g>
    <rect x="35" y="200" width="140" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="105" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">RAS</text>
    <text x="105" y="233" text-anchor="middle" font-size="10.5" fill="#1d4ed8">TOS read (no push/pop)</text>
    <rect x="395" y="200" width="140" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="465" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">RAS</text>
    <text x="465" y="233" text-anchor="middle" font-size="10.5" fill="#1d4ed8">push / pop, redirect</text>
    <rect x="575" y="200" width="150" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="650" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">RAS</text>
    <text x="650" y="233" text-anchor="middle" font-size="10.5" fill="#1d4ed8">s3 repair (= s2 reg.)</text>
    <!-- arrows along RAS path -->
    <defs>
      <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2563eb"/></marker>
    </defs>
    <line x1="175" y1="220" x2="392" y2="220" stroke="#2563eb" stroke-width="2" marker-end="url(#ah)" stroke-dasharray="5,4"/>
    <line x1="535" y1="220" x2="572" y2="220" stroke="#2563eb" stroke-width="2" marker-end="url(#ah)"/>
  </g>
  <!-- type gate note -->
  <g>
    <rect x="35" y="276" width="690" height="70" rx="6" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="48" y="296" font-size="12" font-weight="700" fill="#b45309">Type-gated, outside the SC &gt; TAGE &gt; FTB &gt; uBTB override chain</text>
    <text x="48" y="315" font-size="11.5" fill="#92400e">Acts only on FTB-classified call (push) / return (pop). Overrides FTB target for returns only.</text>
    <text x="48" y="333" font-size="11.5" fill="#92400e">Does not predict direction. s0 read is the initial prediction; s2 result may correct it.</text>
  </g>
</svg>
